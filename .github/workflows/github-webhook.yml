name: Notify backend on push

on:
  push:

jobs:
  notify-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Send push payload to backend webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          # GITHUB_EVENT_PATH contains the full webhook-style payload for the event
          payload=$(cat "$GITHUB_EVENT_PATH")
          # Compute signature if secret provided
          if [ -n "$WEBHOOK_SECRET" ]; then
            signature=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')
            sig_header="sha256=$signature"
          else
            sig_header=""
          fi

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            ${sig_header:+-H "X-Hub-Signature-256: $sig_header"} \
            -d "$payload"
